{{- /*
Internal test-only hook (not documented in values.yaml).
Production must pre-create the Secret named by auth.existingSecret.
When auth.token is set (e.g. ci/*-values.yaml), the chart creates that Secret
so chart-testing (ct install) can run without a pre-existing Secret.
*/}}
{{- if .Values.auth.token }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lm-otel-container.secretName" . }}
  labels:
    {{- include "lm-otel-container.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.auth.secretKey }}: {{ .Values.auth.token | quote }}
{{- end }}
