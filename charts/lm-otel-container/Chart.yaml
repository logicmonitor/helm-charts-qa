apiVersion: v2
name: lm-otel-container
description: OpenTelemetry Collectors for Kubernetes metrics export to LogicMonitor via OTLP/HTTP
type: application
version: 0.1.0-rc01
appVersion: "0.149.0"
keywords:
  - opentelemetry
  - kubernetes
  - metrics
  - logicmonitor
maintainers:
  - name: logicmonitor
dependencies:
  - name: kube-state-metrics
    version: 7.2.2
    repository: https://prometheus-community.github.io/helm-charts
    condition: ksm.bundled.enabled
